services:
  bot:
    build:
      context: .
    env_file:
      - .env
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ALL_PROXY: ${ALL_PROXY}
      DATABASE_PATH: ${DATABASE_PATH:-data/bot.sqlite3}
      CHECK_THROTTLE_SECONDS: ${CHECK_THROTTLE_SECONDS:-30}
      DEV_MODE: ${DEV_MODE:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ADMIN_ID: ${ADMIN_ID:-}
    volumes:
      - ./data:/app/data
    networks:
      - default
      - vless-net
    restart: unless-stopped

networks:
  vless-net:
    external: true
    name: vless-net
